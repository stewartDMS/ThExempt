name: thexempt
description: Social network connecting builders to real business projects
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase for auth, database, and storage
  supabase_flutter: ^2.8.4

  # Load credentials from .env file
  flutter_dotenv: ^5.1.0

  # Storage for local user session data
  shared_preferences: ^2.2.2
  
  # Icons
  cupertino_icons: ^1.0.6
  
  # Video playback
  video_player: ^2.8.2
  
  # Open social links in browser
  url_launcher: ^6.2.4
  
  # Upload avatar image
  file_picker: ^6.1.1

  # Real-time communication
  web_socket_channel: ^2.4.0

  # Rich text rendering
  flutter_markdown: ^0.6.18

  # Image selection for discussions
  image_picker: ^1.0.7

  # Charts for analytics
  fl_chart: ^0.66.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
